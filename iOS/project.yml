name: Coverageapp
options:
  bundleIdPrefix: com.shimondeitel.coverageapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Coverageapp:
    type: application
    platform: iOS
    sources:
      - path: Coverageapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coverageapp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Coverageapp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CoverageappTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CoverageappTests
      - path: Coverageapp.storekit
    dependencies:
      - target: Coverageapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coverageapp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CoverageappUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CoverageappUITests
    dependencies:
      - target: Coverageapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coverageapp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Coverageapp:
    build:
      targets:
        Coverageapp: all
        CoverageappTests: [test]
        CoverageappUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Coverageapp.storekit
    test:
      config: Debug
      storeKitConfiguration: Coverageapp.storekit
      targets:
        - CoverageappTests
        - CoverageappUITests
    archive:
      config: Release
